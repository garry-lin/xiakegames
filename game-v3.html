<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <title>老師來了！</title>
  <style>
    :root{--ink:#253044;--paper:#fff8e8;--red:#ff4d5b;--gold:#ffd166;--green:#55d187;--blue:#45b7ff}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#fff7db,#c8e7ff)}
    #gameShell{width:100vw;height:100vh;display:grid;place-items:center;padding:14px}#gameCard{width:min(100%,1040px);height:min(100%,720px);position:relative;overflow:hidden;border:6px solid var(--ink);border-radius:28px;background:#ffe7a3;box-shadow:0 20px 0 rgba(37,48,68,.18);touch-action:none}
    #scene{position:absolute;inset:0;overflow:hidden;background:linear-gradient(#fff3c4 0 48%,#f1b66b 48% 61%,#d98b51 61% 100%)}
    #blackboard{position:absolute;left:13%;top:14%;width:46%;height:16%;border:10px solid var(--ink);border-radius:12px;background:#2f8b72;color:#d8f6e5;display:grid;place-items:center;font-size:clamp(18px,3vw,34px);font-weight:900;opacity:.92}
    #clock{position:absolute;right:20%;top:11%;width:90px;height:90px;border:5px solid var(--ink);border-radius:50%;background:var(--paper)}#clock:before{content:"";position:absolute;left:50%;top:50%;width:4px;height:28px;background:var(--ink);transform-origin:bottom;transform:translate(-50%,-100%) rotate(0deg)}#clock:after{content:"";position:absolute;left:50%;top:50%;width:26px;height:4px;background:var(--ink);transform-origin:left;transform:rotate(15deg)}
    #lamp{position:absolute;right:8%;top:12%;width:82px;height:82px;border:5px solid var(--ink);border-radius:50%;background:var(--green);display:grid;place-items:center;font-weight:1000;font-size:18px}.warning #lamp{background:var(--gold)}.looking #lamp{background:var(--red);color:#fff}
    #teacher{position:absolute;right:18%;top:32%;width:150px;height:250px}.head{position:absolute;left:22px;top:0;width:106px;height:106px;border:6px solid var(--ink);border-radius:50%;background:#30384d}.face{display:none;position:absolute;inset:18px 14px 14px;background:#fff8e8;border-radius:50%}.looking .face{display:block}.eyes{position:absolute;left:24px;right:24px;top:36px;display:flex;justify-content:space-between}.eyes i{width:10px;height:10px;background:var(--ink);border-radius:50%}.mouth{position:absolute;left:36px;right:36px;top:62px;border-top:5px solid var(--ink)}.hair{position:absolute;left:12px;top:-2px;width:130px;height:60px;border-radius:50% 50% 8px 8px;background:#30384d}.body{position:absolute;left:25px;top:92px;width:100px;height:115px;border:6px solid var(--ink);border-radius:18px;background:#3b82f6}.body:after{content:"背對";position:absolute;left:0;right:0;top:24px;text-align:center;color:#fff;font-size:24px;font-weight:1000;text-shadow:2px 2px 0 var(--ink)}.looking .body:after{content:"看你！"}.arm{position:absolute;top:120px;width:82px;height:6px;background:var(--ink)}.arm.l{left:-32px;transform:rotate(-42deg)}.arm.r{right:-32px;transform:rotate(42deg)}
    #student{position:absolute;left:27%;top:43%;width:260px;height:250px}.student-head{position:absolute;left:82px;top:0;width:105px;height:105px;border:5px solid var(--ink);border-radius:50%;background:#fff8e8}.student-head:before{content:"";position:absolute;left:-7px;right:-7px;top:-5px;height:48px;border-radius:60px 60px 8px 8px;background:#5a3b2f}.student-head:after{content:"";position:absolute;left:36px;top:52px;width:11px;height:11px;background:var(--ink);border-radius:50%;box-shadow:38px 0 0 var(--ink)}.shirt{position:absolute;left:72px;top:86px;width:125px;height:88px;border:5px solid var(--ink);border-radius:18px;background:#ff9f1c}.desk{position:absolute;left:0;right:0;top:125px;height:64px;border:5px solid var(--ink);border-radius:12px;background:#8b5a2b}.desk:before,.desk:after{content:"";position:absolute;top:58px;width:34px;height:94px;border:5px solid var(--ink);background:#70451f}.desk:before{left:28px}.desk:after{right:28px}.book,.phone{position:absolute;left:75px;top:125px;width:120px;height:44px;border:4px solid var(--ink);border-radius:8px;background:#fff8e8;display:grid;place-items:center;color:#45b7ff;font-size:24px;font-weight:900}.phone{display:none;background:#172033;color:#fff}.playing .book{display:none}.playing .phone{display:grid}.playing .phone:after{content:"GAME";color:#7ed3ff}.studying .book:after{content:"認真讀書"}
    #bigWarn{position:absolute;left:0;right:0;top:34%;text-align:center;font-size:clamp(34px,6vw,58px);font-weight:1000;display:none}.warning #bigWarn{display:block}.looking #bigWarn{display:none;color:var(--red)}
    #hud{position:absolute;inset:12px 12px auto 12px;z-index:3;display:flex;flex-wrap:wrap;justify-content:space-between;gap:8px;pointer-events:none}.pill{background:rgba(255,248,232,.96);border:3px solid var(--ink);border-radius:999px;padding:7px 12px;font-weight:1000;box-shadow:0 5px 0 rgba(37,48,68,.16);white-space:nowrap;font-size:clamp(12px,1.8vw,16px)}
    #tapHint{position:absolute;left:50%;bottom:96px;z-index:3;transform:translateX(-50%);padding:7px 12px;border:3px solid var(--ink);border-radius:999px;background:rgba(255,248,232,.92);font-weight:1000;pointer-events:none}#controls{position:absolute;left:50%;bottom:18px;z-index:4;transform:translateX(-50%);display:flex;gap:12px;width:min(92%,580px)}button{flex:1;min-height:58px;border:4px solid var(--ink);border-radius:18px;font-size:clamp(17px,3vw,28px);font-weight:1000;color:var(--ink);box-shadow:0 8px 0 var(--ink);cursor:pointer;touch-action:manipulation}button:active,button.active{transform:translateY(7px);box-shadow:0 1px 0 var(--ink)}#playBtn{background:linear-gradient(#6ee7a8,#2fc776)}#studyBtn{background:linear-gradient(#7ed3ff,#37a6ff)}
    #overlay{position:absolute;inset:0;z-index:5;display:grid;place-items:center;padding:14px;background:#fff8e8}.hidden{display:none!important}#panel{width:min(94%,780px);max-height:calc(100vh - 28px);overflow:auto;background:var(--paper);border:6px solid var(--ink);border-radius:26px;padding:22px;text-align:center;box-shadow:0 14px 0 rgba(37,48,68,.28)}#panel h1{margin:0 0 8px;font-size:clamp(36px,6.2vw,60px);line-height:.95;color:var(--red);text-shadow:3px 3px 0 var(--ink),6px 6px 0 var(--gold)}#panel p{margin:7px 0;font-weight:900;line-height:1.45}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.modeBtn{min-height:70px;font-size:clamp(16px,2.4vw,22px);line-height:1.15;padding:8px}#timedBtn,#startBtn{background:linear-gradient(#ffd166,#ff9f1c)}#survivalBtn{background:linear-gradient(#b8f7ff,#45b7ff)}#nameInput{width:100%;margin:12px 0 4px;padding:12px 14px;border:4px solid var(--ink);border-radius:16px;background:#fff;color:var(--ink);font:900 18px inherit;text-align:center;outline:none}.small{opacity:.78;font-size:14px!important}
    #scene.shake{animation:shake .16s linear 4}@keyframes shake{25%{transform:translate(4px,-3px)}50%{transform:translate(-4px,3px)}75%{transform:translate(3px,2px)}}@media(max-height:620px){#panel{padding:14px 16px;border-width:4px}#panel h1{font-size:clamp(30px,5vw,48px)}#panel p{margin:4px 0;line-height:1.25}.modeBtn{min-height:58px}#startBtn{display:none}}@media(max-width:720px){#gameShell{padding:8px}#gameCard{border-width:4px;border-radius:22px}#hud{inset:8px;justify-content:center}.pill{padding:5px 8px;border-width:2px}#teacher{right:8%;transform:scale(.75);transform-origin:top right}#student{left:16%;transform:scale(.78);transform-origin:top left}#controls{bottom:12px;gap:8px;width:94%}button{min-height:54px;border-width:3px}}
  </style>
</head>
<body>
<main id="gameShell"><section id="gameCard" aria-label="老師來了遊戲區"><div id="scene" class="studying"><div id="blackboard">今日小考：不要偷玩手機</div><div id="clock"></div><div id="lamp">安全</div><div id="teacher"><div class="hair"></div><div class="head"><div class="face"><div class="eyes"><i></i><i></i></div><div class="mouth"></div></div></div><div class="body"></div><div class="arm l"></div><div class="arm r"></div></div><div id="student"><div class="student-head"></div><div class="shirt"></div><div class="desk"></div><div class="book"></div><div class="phone"></div></div><div id="bigWarn">老師要轉頭了</div></div><div id="hud"><div class="pill">玩家：<span id="playerText">同學</span></div><div class="pill">分數：<span id="score">0</span></div><div class="pill">模式：<span id="modeText">未開始</span></div><div class="pill">時間：<span id="timeText">--</span></div><div class="pill">最高：<span id="best">0</span></div><div class="pill">狀態：<span id="stateText">準備上課</span></div></div><div id="tapHint">手機：按住畫面偷玩，放開就讀書</div><div id="controls"><button id="playBtn">📱 偷玩手機</button><button id="studyBtn">📖 假裝讀書</button></div><div id="overlay"><div id="panel"><h1>老師來了！</h1><p>老師背對你時偷玩手機；老師轉頭時立刻假裝讀書。</p><p>選擇模式開始挑戰。</p><input id="nameInput" maxlength="10" value="同學" aria-label="玩家暱稱"><div class="row"><button id="timedBtn" class="modeBtn">⏱️ 60秒<br>限時挑戰</button><button id="survivalBtn" class="modeBtn">🛡️ 生存<br>模式</button></div><p class="small">教學：背對時偷玩加分｜黃色警告快收手機｜紅色看你時一定要讀書。</p><p class="small">電腦：空白鍵偷玩，S / ↓ 讀書。手機：按住遊戲畫面偷玩，放開讀書。</p><button id="startBtn">開始60秒挑戰</button></div></div></section></main>
<script>
const $=id=>document.getElementById(id);const ui={scene:$('scene'),overlay:$('overlay'),score:$('score'),modeText:$('modeText'),timeText:$('timeText'),best:$('best'),stateText:$('stateText'),playerText:$('playerText'),name:$('nameInput'),play:$('playBtn'),study:$('studyBtn'),lamp:$('lamp'),bigWarn:$('bigWarn'),start:$('startBtn'),timed:$('timedBtn'),survival:$('survivalBtn'),card:$('gameCard')};
const store={name:'teacherGameName',timed:'teacherGameLeaderboardTimed',surv:'teacherGameLeaderboardSurvival'};let g={running:false,mode:'timed',studying:true,looking:false,warning:false,score:0,start:0,last:0,next:1800,warnUntil:0,lookUntil:0,combo:0,msg:'準備上課',difficulty:1};
let audioCtx=null,lastScoreSound=0,lastWarnSound=0;
function ensureAudio(){try{if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}catch{}}
function tone(freq=440,dur=.08,type='square',vol=.05){try{ensureAudio();let o=audioCtx.createOscillator(),gain=audioCtx.createGain();o.type=type;o.frequency.value=freq;gain.gain.setValueAtTime(vol,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);o.connect(gain);gain.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch{}}
function sound(kind){if(kind==='tap')tone(560,.045,'square',.035);if(kind==='score')tone(880,.045,'sine',.025);if(kind==='warn'){tone(320,.08,'sawtooth',.055);setTimeout(()=>tone(260,.09,'sawtooth',.05),90)}if(kind==='look')tone(180,.12,'square',.06);if(kind==='caught'){tone(120,.25,'sawtooth',.09);setTimeout(()=>tone(90,.25,'square',.06),120)}if(kind==='bell')[660,880,990,880].forEach((f,i)=>setTimeout(()=>tone(f,.16,'sine',.06),i*150))}

function name(){return (ui.name.value||'同學').trim().slice(0,10)||'同學'}function fmt(ms){let s=Math.max(0,Math.ceil(ms/1000));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}function boardKey(){return g.mode==='survival'?store.surv:store.timed}function best(){try{let b=JSON.parse(localStorage.getItem(boardKey())||'[]')[0];return b?(g.mode==='survival'?fmt(b.t):String(b.s)):(g.mode==='survival'?'0:00':'0')}catch{return g.mode==='survival'?'0:00':'0'}}function save(){try{let k=boardKey(),a=JSON.parse(localStorage.getItem(k)||'[]'),t=performance.now()-g.start;a.push({n:name(),s:g.score,t});a.sort((x,y)=>g.mode==='survival'?y.t-x.t:y.s-x.s);localStorage.setItem(k,JSON.stringify(a.slice(0,10)))}catch{}}
function reset(mode){ensureAudio();sound('tap');lastScoreSound=0;lastWarnSound=0;g={running:true,mode,studying:true,looking:false,warning:false,score:0,start:performance.now(),last:performance.now(),next:1800+Math.random()*2400,warnUntil:0,lookUntil:0,combo:0,msg:'老師背對你，快偷玩！',difficulty:1};localStorage.setItem(store.name,name());ui.overlay.classList.add('hidden');render()}
function end(reason){if(!g.running)return;g.running=false;save();g.msg=reason;reason==='時間到！'?sound('bell'):sound('caught');ui.overlay.classList.remove('hidden');render()}
function setStudy(v){if(!g.running)return;if(g.studying!==v)sound('tap');g.studying=v;render()}
function render(){ui.playerText.textContent=name();ui.score.textContent=g.score;ui.modeText.textContent=g.mode==='survival'?'生存':'60秒';let elapsed=g.running?performance.now()-g.start:0;ui.timeText.textContent=g.mode==='survival'?fmt(elapsed):fmt(60000-elapsed);ui.best.textContent=best();ui.stateText.textContent=g.msg;ui.scene.className=(g.looking?'looking ':g.warning?'warning ':'')+(g.studying?'studying':'playing');ui.play.classList.toggle('active',!g.studying);ui.study.classList.toggle('active',g.studying);ui.lamp.textContent=g.looking?'看你！':g.warning?'注意':'安全'}
function tick(now){if(g.running){let dt=Math.min(.05,(now-g.last)/1000);g.last=now;let elapsed=now-g.start;g.difficulty=1+elapsed/35000+g.score/1200;if(g.mode==='timed'&&elapsed>=60000){end('時間到！');return requestAnimationFrame(tick)}if(!g.looking&&!g.warning&&elapsed>g.next){g.warning=true;g.warnUntil=elapsed+450+Math.random()*650;g.msg='老師好像要轉頭了！';ui.scene.classList.add('shake');if(now-lastWarnSound>650){sound('warn');lastWarnSound=now}}if(g.warning&&elapsed>g.warnUntil){g.warning=false;g.looking=true;g.lookUntil=elapsed+700+Math.random()*1200;g.msg='老師正在看！快讀書！';sound('look')}if(g.looking&&elapsed>g.lookUntil){g.looking=false;g.next=elapsed+1100+Math.random()*Math.max(1300,4200/g.difficulty);g.msg='老師背對你，快偷玩！'}if(g.looking&&!g.studying){end('被老師抓到！');return requestAnimationFrame(tick)}if(!g.looking&&!g.studying){g.combo+=dt;if(Math.floor(now/120)!==Math.floor((now-dt*1000)/120)){g.score+=1+Math.floor(g.combo*2);if(now-lastScoreSound>180){sound('score');lastScoreSound=now}}if(!g.warning)g.msg=g.combo>2?'連續偷玩中！':'偷玩手機中...'}else{g.combo=Math.max(0,g.combo-dt*1.8);if(!g.looking&&!g.warning&&g.studying)g.msg='安全但沒加分，找機會偷玩！'}render()}requestAnimationFrame(tick)}
document.addEventListener('pointerdown',ensureAudio,{once:true});document.addEventListener('keydown',ensureAudio,{once:true});ui.name.value=localStorage.getItem(store.name)||'同學';ui.name.oninput=render;ui.timed.onclick=()=>reset('timed');ui.survival.onclick=()=>reset('survival');ui.start.onclick=()=>reset('timed');ui.play.onpointerdown=e=>{e.preventDefault();setStudy(false)};ui.play.onpointerup=e=>{e.preventDefault();setStudy(true)};ui.play.onpointerleave=()=>setStudy(true);ui.study.onpointerdown=e=>{e.preventDefault();setStudy(true)};ui.card.onpointerdown=e=>{if(e.target.closest('button,input')||!g.running)return;e.preventDefault();setStudy(false)};ui.card.onpointerup=e=>{if(g.running){e.preventDefault();setStudy(true)}};window.onkeydown=e=>{if(e.code==='Enter'&&!g.running)reset('timed');if(!g.running)return;if(e.code==='Space'){e.preventDefault();setStudy(false)}if(e.key.toLowerCase()==='s'||e.code==='ArrowDown')setStudy(true)};window.onkeyup=e=>{if(g.running&&e.code==='Space')setStudy(true)};render();requestAnimationFrame(tick);
</script>
</body></html>
